# To set up tmux you just need to run this commands
# mkdir -p ~/.tmux/plugins
# git clone https://github.com/2kabhishek/tmux2k ~/.tmux/plugins/tmux2k
# git clone https://github.com/christoomey/vim-tmux-navigator ~/.tmux/plugins/vim-tmux-navigator
# tmux source-file .tmux.conf

# Enable mouse support
set -g mouse on
set -g base-index 1

# Start pane numbering at 1
setw -g pane-base-index 1

# Re-number windows when one is closed
set -g renumber-windows on

# Set the prefix to Ctrl + Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g default-shell /bin/bash

# Set the color theme to Catppuccin Mocha
set -g @tmux2k-text "#181825"
set -g @tmux2k-bg-main "#191824"
set -g @tmux2k-bg-alt "#313244"
set -g @tmux2k-black "#181825"
set -g @tmux2k-red "#f38ba8"
set -g @tmux2k-light-red "#eba0ac"
set -g @tmux2k-green "#a6e3a1"
set -g @tmux2k-light-green "#94e2d5"
set -g @tmux2k-blue "#89b4fa"
set -g @tmux2k-light-blue "#89dceb"
set -g @tmux2k-yellow "#fab387"
set -g @tmux2k-light-yellow "#f9e2af"
set -g @tmux2k-purple "#cba6f7"
set -g @tmux2k-light-purple "#f5c2e7"

# Selection highlight colors
set -g mode-style "fg=#{@tmux2k-text}, bg=#{@tmux2k-blue}"

# Window separators
set -g @tmux2k-window-left-sep ""
set -g @tmux2k-window-right-sep ""

# Plugins
set -g @tmux2k-left-plugins "cwd git"
set -g @tmux2k-right-plugins "cpu ram battery time"

# Set plugin colors
set -g @tmux2k-cwd-colors "blue text"
set -g @tmux2k-git-colors "bg_alt purple"
set -g @tmux2k-cpu-colors "bg_alt purple"
set -g @tmux2k-ram-colors "bg_alt purple"
set -g @tmux2k-battery-colors "bg_alt purple"
set -g @tmux2k-time-colors "blue text"

# Military time
set -g @tmux2k-military-time true

# Set CPU and RAM labels
set -g @tmux2k-cpu-usage-label ""
set -g @tmux2k-ram-usage-label ""

# Set theme
set -g @catppuccin_flavour 'mocha'


# set vi-mode
set-window-option -g mode-keys vi

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Make copy mode use vi keys
setw -g mode-keys vi

# Enter copy mode with Alt + v (No prefix needed)
bind -n M-v copy-mode

# Use 'v' to begin selection (Once inside copy mode)
bind -T copy-mode-vi v send-keys -X begin-selection

# Use 'C-v' for rectangle toggle (Standard Vim behavior)
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Use 'y' to yank and exit
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i || pbcopy"

# the new planes have the same cwd as the splited plane
bind '-' split-window -v -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"

set -g @plugin '2kabhishek/tmux2k'

run-shell "bash ~/.tmux/plugins/tmux2k/tmux2k.tmux"
