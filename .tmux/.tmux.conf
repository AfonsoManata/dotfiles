# ---------------------------
# Basic Settings
# ---------------------------
# Enable mouse support
set -g mouse on

# Prefix key (safer than Ctrl+Space)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes at 1
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

# Terminal colors
set-option -sa terminal-overrides ",xterm*:Tc"
set escape-time 0

# ---------------------------
# Vim-style pane & window navigation
# ---------------------------
# Pane selection with Vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window switching with Alt + H/L
bind -n M-H previous-window
bind -n M-L next-window

# Split panes using current directory
bind '|' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"

# ---------------------------
# Copy Mode (VI keys)
# ---------------------------
set-window-option -g mode-keys vi

# Start selection
bind -T copy-mode-vi v send-keys -X begin-selection

# Rectangle toggle (inside copy-mode)
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Copy selection and exit
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Enter copy-mode with Ctrl+v (global)
bind -n C-v copy-mode -u

# ---------------------------
# Theme / Colors
# ---------------------------
# tmux2k theme
set -g @tmux2k-text "#181825"
set -g @tmux2k-bg-main "#191824"
set -g @tmux2k-bg-alt "#313244"
set -g @tmux2k-black "#181825"
set -g @tmux2k-red "#f38ba8"
set -g @tmux2k-light-red "#eba0ac"
set -g @tmux2k-green "#a6e3a1"
set -g @tmux2k-light-green "#94e2d5"
set -g @tmux2k-blue "#89b4fa"
set -g @tmux2k-light-blue "#89dceb"
set -g @tmux2k-yellow "#fab387"
set -g @tmux2k-light-yellow "#f9e2af"
set -g @tmux2k-purple "#cba6f7"
set -g @tmux2k-light-purple "#f5c2e7"

set -g mode-style "fg=#{@tmux2k-text}, bg=#{@tmux2k-blue}"

# tmux2k plugins
set -g @tmux2k-left-plugins "cwd git"
set -g @tmux2k-right-plugins "cpu ram battery time"

# ---------------------------
# TPM Plugins
# ---------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin '2kabhishek/tmux2k'

# Automatically save and restore sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# Source tmux2k config (make sure this file exists)
if-shell "[ -f ~/.config/tmux/tmux2k.conf ]" "source ~/.config/tmux/tmux2k.conf"

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
