[env]
TERM = "xterm-256color"

[window]
padding.x = 5
padding.y = 5

decorations = "Buttonless"

opacity = 0.3
blur = false

[font]
normal.family = "JetBrainsMono Nerd Font"

size = 13


[general]
import = [
    "~/.config/alacritty/themes/themes/coolnight.toml"
]

[terminal.shell]
program = "/bin/bash"
args = ["-l"]

